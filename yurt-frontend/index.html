<!--
  ╔══════════════════════════════════════════════════════════════╗
  ║        GİRİŞ SAYFASI — YURT YÖNETİM SİSTEMİ               ║
  ╠══════════════════════════════════════════════════════════════╣
  ║  Bu dosya yurt yönetim sisteminin GİRİŞ (LOGIN) sayfasıdır.║
  ║  Kullanıcı email + şifre girerek sisteme giriş yapar.      ║
  ║                                                              ║
  ║  AKIŞ:                                                       ║
  ║  1. Kullanıcı email ve şifresini girer                      ║
  ║  2. Backend'e POST /login isteği gönderilir                 ║
  ║  3. Doğruysa JWT token döner → localStorage'a kaydedilir    ║
  ║  4. Kullanıcı rolüne (user_type) göre yönlendirilir:       ║
  ║     • Öğrenci → student-panel.html                          ║
  ║     • Yönetici / Admin / SuperAdmin → admin-panel.html      ║
  ║     • Güvenlik / Bakım / Temizlik → admin-panel.html        ║
  ║                                                              ║
  ║  OTOMATİK YÖNLENDİRME:                                      ║
  ║  Sayfa açıldığında localStorage'da token varsa,              ║
  ║  /profile endpoint'ine istek yaparak token geçerliliğini     ║
  ║  kontrol eder. Geçerliyse tekrar giriş yapmadan yönlendirir.║
  ╚══════════════════════════════════════════════════════════════╝

<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">

<style>
/*
  ══════════════════════════════════════════════════════════════
  CSS STİLLERİ — GİRİŞ SAYFASI
  ══════════════════════════════════════════════════════════════
  Bu sayfa diğer panellerden farklı olarak tek bir login kutusu içerir.
  Sayfa ortasında cam efektli (glassmorphism) bir kart gösterir.
*/

/* ─────────────────────────────────────────────
   1) TEMEL SIFIRLAMA
   ─────────────────────────────────────────────
*/
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: #f0f4ff;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  overflow: hidden;
}

/* ─────────────────────────────────────────────
   2) CANLI ARKA PLAN — 4 küre + yıldız parçacıkları
   ─────────────────────────────────────────────
   Login sayfasında 4 renkli küre kullanılır (panellerde 3).
   Ek olarak .particles katmanı ile minik yıldızlar oluşturulur.
*/
.live-bg {
  position: fixed; inset: 0; z-index: 0; overflow: hidden;
  background: linear-gradient(135deg, #ede9fe 0%, #e0f2fe 50%, #fdf4ff 100%);
}
.live-bg .orb {
  position: absolute; border-radius: 50%; filter: blur(110px);
  animation: orbFloat 20s ease-in-out infinite; opacity: 0.60;
}
.live-bg .orb:nth-child(1) {
  width: 600px; height: 600px; top: -10%; left: -5%;
  background: radial-gradient(circle, #c4b5fd, transparent 70%);
  animation-duration: 22s;
}
.live-bg .orb:nth-child(2) {
  width: 500px; height: 500px; top: 50%; right: -8%;
  background: radial-gradient(circle, #a5f3fc, transparent 70%);
  animation-duration: 18s; animation-delay: -5s;
}
.live-bg .orb:nth-child(3) {
  width: 400px; height: 400px; bottom: -5%; left: 30%;
  background: radial-gradient(circle, #f9a8d4, transparent 70%);
  animation-duration: 25s; animation-delay: -10s;
}
.live-bg .orb:nth-child(4) {
  width: 280px; height: 280px; top: 30%; left: 50%;
  background: radial-gradient(circle, #fde68a, transparent 70%);
  animation-duration: 30s; animation-delay: -15s; opacity: 0.45;
}

/* Minik yıldız parçacıkları — radial-gradient ile nokta deseni */
.live-bg .particles {
  position: absolute; inset: 0;
  background-image:
    radial-gradient(2px 2px at 10% 20%, rgba(99,102,241,0.35) 0%, transparent 100%),
    radial-gradient(2px 2px at 80% 10%, rgba(139,92,246,0.30) 0%, transparent 100%),
    radial-gradient(3px 3px at 30% 70%, rgba(6,182,212,0.25) 0%, transparent 100%),
    radial-gradient(2px 2px at 60% 50%, rgba(99,102,241,0.30) 0%, transparent 100%),
    radial-gradient(2px 2px at 90% 80%, rgba(249,168,212,0.35) 0%, transparent 100%),
    radial-gradient(3px 3px at 50% 30%, rgba(139,92,246,0.20) 0%, transparent 100%),
    radial-gradient(2px 2px at 20% 90%, rgba(6,182,212,0.25) 0%, transparent 100%),
    radial-gradient(2px 2px at 75% 60%, rgba(99,102,241,0.20) 0%, transparent 100%),
    radial-gradient(2px 2px at 40% 15%, rgba(249,168,212,0.30) 0%, transparent 100%);
  animation: particleDrift 60s linear infinite;
}

/* Küre hareketi */
@keyframes orbFloat {
  0%, 100% { transform: translate(0, 0) scale(1); }
  25%      { transform: translate(40px, -30px) scale(1.05); }
  50%      { transform: translate(-20px, 40px) scale(0.95); }
  75%      { transform: translate(30px, 20px) scale(1.02); }
}
/* Parçacık kayma animasyonu */
@keyframes particleDrift {
  0%   { transform: translateY(0); }
  100% { transform: translateY(-100px); }
}

/* ─────────────────────────────────────────────
   3) GİRİŞ KUTUSU — Glassmorphism kartı
   ─────────────────────────────────────────────
   backdrop-filter: blur → Arkasındaki arka planı bulanıklaştırır.
   Bu "cam efekti" modern web tasarımının popüler tekniğidir.
*/
.login-container {
  background: rgba(255,255,255,.90);
  border-radius: 20px;
  box-shadow: 0 24px 64px rgba(99,102,241,.15), 0 0 0 1px rgba(99,102,241,.1);

}

<!-- ═══════════════════════════════════════════════════════════
     JAVASCRIPT — Giriş mantığı
     ═══════════════════════════════════════════════════════════

     ÇALIŞMA PRENSİBİ:
     1. Sayfa açıldığında → token varsa otomatik yönlendirme dene
     2. Kullanıcı "Giriş Yap" tıklar → login() çağrılır
     3. POST /login → email + şifre gönderilir
     4. Başarılıysa → token + user_type localStorage'a kaydedilir
     5. redirectByRole() → role göre doğru panele yönlendirilir

     FONKSİYON LİSTESİ:
     ┌──────────────────────┬──────────────────────────────────────────┐
     │ login()              │ Email/şifre ile giriş yapar              │
     │ redirectByRole(role) │ Kullanıcı rolüne göre yönlendirir        │
     │ tryAutoRedirect()    │ Mevcut token ile otomatik yönlendirme    │
     └──────────────────────┴──────────────────────────────────────────┘
-->
<script>

// ─────────────────────────────────────────────
// 1. API ADRESİ
// ─────────────────────────────────────────────
// window.location.origin → Tarayıcının adres çubuğundaki protokol + host + port
// Örnek: "http://localhost:3000"
const API = '/api';

// ─────────────────────────────────────────────
// 2. ENTER TUŞU DESTEĞİ
// ─────────────────────────────────────────────
// Şifre alanında Enter → giriş yap
// Email alanında Enter → şifre alanına geç
document.getElementById('password').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') login();
});
document.getElementById('email').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('password').focus();
});

// ─────────────────────────────────────────────
// 3. OTOMATİK YÖNLENDİRME
// ─────────────────────────────────────────────
// Sayfa yüklendiğinde localStorage'da token varsa,
// backend'den token geçerliliğini kontrol et.
// Geçerliyse tekrar giriş yapmadan doğru panele yönlendir.
window.addEventListener('DOMContentLoaded', () => {
  const token = localStorage.getItem('token');
  if (token) {
    tryAutoRedirect(token);
  }
});

/**
 * tryAutoRedirect — Kayıtlı token ile otomatik yönlendirme dener.
 * /profile endpoint'ine istek yapar → token geçerliyse kullanıcı bilgisini alır.
 * @param {string} token - localStorage'daki JWT token
 */
async function tryAutoRedirect(token) {
  try {
    const res = await fetch(API + '/profile', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    if (res.ok) {
      const profile = await res.json();
      // Kullanıcı tipini localStorage'a kaydet (sayfa geçişlerinde gerekli)
      localStorage.setItem('user_type', profile.user_type);
      // Doğru panele yönlendir
      redirectByRole(profile.user_type);
    }
    // Token geçersizse → hiçbir şey yapma, kullanıcı giriş ekranında kalır
  } catch {
    // Ağ hatası → yine login ekranında kal
  }
}

// ─────────────────────────────────────────────
// 4. GİRİŞ FONKSİYONU
// ─────────────────────────────────────────────

/**
 * login — Ana giriş fonksiyonu.
 *
 * ADIMLAR:
 * 1. Email ve şifre alanlarından değerleri al
 * 2. Boş alan varsa hata mesajı göster
 * 3. POST /login isteği gönder
 * 4. Başarılıysa → token + user_type kaydet → yönlendir
 * 5. Başarısızsa → hata mesajı göster
 *
 * API: POST /login
 * Body: { email, password }
 * Başarılı Yanıt: { message, token, user_type }
 * Hata Yanıtları: 401 (yanlış email/şifre), 403 (email doğrulanmamış/hesap pasif)
 */
async function login() {
  // Form alanlarından değerleri al
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('btn-login');
  const errMsg   = document.getElementById('error-msg');
  const sucMsg   = document.getElementById('success-msg');

  // Önceki mesajları gizle
  errMsg.style.display = 'none';
  sucMsg.style.display = 'none';

  // Boş alan kontrolü
  if (!email || !password) {
    errMsg.textContent = 'Email ve şifre gerekli.';
    errMsg.style.display = 'block';
    return;
  }

  // Butonu devre dışı bırak (çift tıklama önleme)
  btn.disabled = true;
  btn.textContent = 'Giriş yapılıyor...';

  try {
    // Backend'e giriş isteği gönder
    const res = await fetch(API + '/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    // Hata durumu (email/şifre yanlış, hesap pasif vb.)
    if (!res.ok) {
      errMsg.textContent = data.message || 'Giriş başarısız.';
      errMsg.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Giriş Yap';
      return;
    }

    // ─── BAŞARILI GİRİŞ ───
    // JWT token ve kullanıcı tipini localStorage'a kaydet
    localStorage.setItem('token', data.token);
    localStorage.setItem('user_type', data.user_type);

    // Başarı mesajı göster
    sucMsg.textContent = 'Giriş başarılı! Yönlendiriliyorsunuz...';
    sucMsg.style.display = 'block';

    // 500ms bekle (kullanıcı mesajı görsün) sonra yönlendir
    setTimeout(() => {
      redirectByRole(data.user_type);
    }, 500);

  } catch (err) {
    // Ağ hatası — sunucuya bağlanılamadı
    errMsg.textContent = 'Sunucuya bağlanılamadı.';
    errMsg.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Giriş Yap';
  }
}

// ─────────────────────────────────────────────
// 5. ROL BAZLI YÖNLENDİRME
// ─────────────────────────────────────────────

/**
 * redirectByRole — Kullanıcı tipine göre doğru panele yönlendirir.
 *
 * Rol → Sayfa eşlemesi:
 * ┌─────────────────┬──────────────────────────┐
 * │ Öğrenci         │ student-panel.html        │
 * │ Yönetici        │ admin-panel.html          │
 * │ Admin           │ admin-panel.html          │
 * │ SuperAdmin      │ admin-panel.html          │
 * │ Güvenlik        │ admin-panel.html          │
 * │ Bakım           │ admin-panel.html          │
 * │ Temizlik        │ admin-panel.html          │
 * │ (Bilinmeyen)    │ student-panel.html        │
 * └─────────────────┴──────────────────────────┘
 *
 * @param {string} role - Kullanıcının rol tipi (user_type)
 */
function redirectByRole(role) {
  if (role === 'Öğrenci') {
    window.location.href = 'student-panel.html';
  } else {
    window.location.href = 'admin-panel.html';
  }
}

// ─────────────────────────────────────────────
// 6. ŞİFREMİ UNUTTUM MODAL
// ─────────────────────────────────────────────

function openForgotModal() {
  const modal = document.getElementById('forgot-modal');
  document.getElementById('forgot-email').value = '';
  document.getElementById('forgot-error').style.display = 'none';
  document.getElementById('forgot-success').style.display = 'none';
  document.getElementById('btn-forgot').disabled = false;
  document.getElementById('btn-forgot').textContent = 'Sıfırlama Linki Gönder';
  modal.classList.add('open');
  setTimeout(() => document.getElementById('forgot-email').focus(), 100);
}

function closeForgotModal() {
  document.getElementById('forgot-modal').classList.remove('open');
}

// Escape tuşu ile modal kapansın
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeForgotModal();
});

// Modal dışına tıklayınca kapat
document.getElementById('forgot-modal').addEventListener('click', function(e) {
  if (e.target === this) closeForgotModal();
});

async function submitForgotPassword() {
  const email   = document.getElementById('forgot-email').value.trim();
  const errEl   = document.getElementById('forgot-error');
  const sucEl   = document.getElementById('forgot-success');
  const btn     = document.getElementById('btn-forgot');

  errEl.style.display = 'none';
  sucEl.style.display = 'none';

  if (!email) {
    errEl.textContent = 'Email adresi gerekli.';
    errEl.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Gönderiliyor...';

  try {
    const res = await fetch(API + '/auth/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    const data = await res.json();

    if (!res.ok) {
      errEl.textContent = data.message || 'Bir hata oluştu.';
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Sıfırlama Linki Gönder';
    } else {
      sucEl.textContent = data.message;
      sucEl.style.display = 'block';
      btn.textContent = 'Gönderildi';
    }
  } catch {
    errEl.textContent = 'Sunucuya bağlanılamadı.';
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Sıfırlama Linki Gönder';
  }
}

// ─────────────────────────────────────────────
// 7. TEMA YÖNETİMİ
// ─────────────────────────────────────────────
function toggleTheme() {
  const cur  = document.documentElement.getAttribute('data-theme') || 'light';
  const next = cur === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  _updateThemeBtn(next);
}
function _updateThemeBtn(t) {
  const icon = document.getElementById('themeIcon');
  const lbl  = document.getElementById('themeLabel');
  if (icon) icon.textContent = t === 'dark' ? '☀️' : '🌙';
  if (lbl)  lbl.textContent  = t === 'dark' ? 'Açık Tema' : 'Koyu Tema';
}
window.addEventListener('DOMContentLoaded', () => {
  _updateThemeBtn(document.documentElement.getAttribute('data-theme') || 'light');
});
